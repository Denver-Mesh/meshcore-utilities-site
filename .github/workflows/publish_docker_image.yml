name: Build & Publish Docker Image
on:
  # Trigger on every push to main/master, if the commit message doesn't contain "[no build]"
  push:
    branches:
      - main
      - master

jobs:
  publish:
    name: Build & Publish to GitHub Packages
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.message, '[no build]') == false
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Establish variables
        id: vars
        run: |
          echo "app_name=coloradomesh-meshcore-utilities" >> "$GITHUB_OUTPUT"
          echo "repo_owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
          echo "today=$(date +'%Y-%m-%d')" >> "$GITHUB_OUTPUT"
          echo "tag=$(date +'%Y-%m-%d')_${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Display variables
        run: |
          echo "App Name: ${{ steps.vars.outputs.app_name }}"
          echo "Repository Owner: ${{ steps.vars.outputs.repo_owner }}"
          echo "Today: ${{ steps.vars.outputs.today }}"
          echo "Tag: ${{ steps.vars.outputs.tag }}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
        id: docker-buildx

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v3
        with:
          builder: ${{ steps.docker-buildx.outputs.name }}
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/${{ steps.vars.outputs.repo_owner }}/${{ steps.vars.outputs.app_name }}:latest
            ghcr.io/${{ steps.vars.outputs.repo_owner }}/${{ steps.vars.outputs.app_name }}:${{ steps.vars.outputs.tag }}
          labels: |
            org.opencontainers.image.title=${{ steps.vars.outputs.app_name }}
            org.opencontainers.image.version=${{ steps.vars.outputs.tag }}
            org.opencontainers.image.created=${{ steps.vars.outputs.today }}
